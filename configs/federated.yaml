# =============================================================================
# Diagram B: full quantum-safe federated run across heterogeneous hospitals.
# Tuned for the H100 box. Override on the CLI for sweeps, e.g.:
#     ... --config configs/federated.yaml aggregation.mode=masked model.backbone=vit
# =============================================================================
run_name: federated
mode: federated

device: auto

data:
  # Default: ONE dataset partitioned across hospitals via Dirichlet non-IID —
  # the standard federated-learning benchmark (label/quantity skew, but a shared
  # label space), which FedAvg can actually learn (~0.87 on pathmnist).
  subsets: [pathmnist]
  partition: noniid
  dirichlet_alpha: 0.5
  # ---------------------------------------------------------------------------
  # OPTIONAL "modality-heterogeneous" stress demo: a different MedMNIST subset
  # per hospital, unified into one label space. This is illustrative of extreme
  # client heterogeneity but the label sets are DISJOINT, so vanilla FedAvg
  # cannot converge (accuracy stays near 1/num_classes). Enable on the CLI:
  #   data.subsets=[pathmnist,octmnist,pneumoniamnist,bloodmnist]
  # ---------------------------------------------------------------------------

federated:
  num_clients: 4
  rounds: 20
  local_epochs: 2
  client_fraction: 1.0
  batch_size: 256
  lr: 0.01

aggregation:
  mode: authorized_decrypt      # set to 'masked' for the privacy-preservation results
  kem:
    backend: kyber-py           # set to 'liboqs' for the reported PQC results

model:
  backbone: resnet
  resnet:
    variant: resnet18

quantum:
  n_qubits: 8
  n_layers: 3
  backend: default.qubit        # set to lightning.gpu on the H100 for speed

ledger:
  backend: hashchain            # set to 'web3' to register on a local dev chain
